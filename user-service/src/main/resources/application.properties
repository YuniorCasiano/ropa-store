# ============================================================
# application.properties - User Service
# ============================================================

# Server
server.port=8081
spring.application.name=user-service

# MongoDB
spring.data.mongodb.uri=mongodb://mongo_user:mongo_pass@localhost:27017/users_db?authSource=admin
spring.data.mongodb.database=users_db

# Logging
logging.level.com.ropastore=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# Jackson
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false