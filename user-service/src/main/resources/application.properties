# ============================================================
# application.properties ? User Service
# Configuración completa del microservicio de usuarios.
# ============================================================

# ?? SERVIDOR ?????????????????????????????????????????????????
# Puerto donde corre este microservicio.
# Cada servicio tiene su propio puerto para no colisionar.
server.port=8081

# Nombre del servicio ? Spring lo usa para identificarse
# en los logs y en las herramientas de monitoreo como Zipkin.
spring.application.name=user-service

# ?? MONGODB ??????????????????????????????????????????????????
# URI de conexión a MongoDB.
# Formato: mongodb://usuario:contraseńa@host:puerto/base_de_datos
# - mongo_user y mongo_pass: credenciales que definimos en docker-compose.yml
# - localhost: porque MongoDB corre en Docker en tu misma máquina
# - 27017: puerto de MongoDB que expusimos en docker-compose.yml
# - authSource=admin: le dice a MongoDB dónde verificar las credenciales
spring.data.mongodb.uri=mongodb://mongo_user:mongo_pass@localhost:27017/users_db?authSource=admin

# Nombre de la base de datos donde se guardarán los usuarios.
# MongoDB la crea automáticamente si no existe.
spring.data.mongodb.database=users_db

# ?? LOGGING ??????????????????????????????????????????????????
# Nivel de detalle de los logs en la consola.
# DEBUG: muestra todo ? consultas a MongoDB, peticiones HTTP, etc.
# Útil durante desarrollo. En producción se cambia a INFO.
logging.level.com.ropastore=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# ?? ACTUATOR ?????????????????????????????????????????????????
# Actuator expone endpoints especiales para monitorear el servicio.
# /actuator/health  ? dice si el servicio está vivo (lo usa Docker)
# /actuator/metrics ? métricas de la aplicación
# /actuator/prometheus ? métricas en formato que Prometheus entiende
management.endpoints.web.exposure.include=health,metrics,prometheus,info

# Muestra detalles del health check ? útil para ver si MongoDB
# está conectado correctamente.
management.endpoint.health.show-details=always

# Habilita las métricas en formato Prometheus
management.prometheus.metrics.export.enabled=true

# ?? JACKSON ??????????????????????????????????????????????????
# Jackson es la librería que convierte objetos Java a JSON y viceversa.
# Esta configuración hace que si un campo es null, no lo incluya
# en la respuesta JSON ? respuestas más limpias.
spring.jackson.default-property-inclusion=non_null

# Formato de fechas en el JSON ? usa ISO 8601 estándar internacional.
# Ejemplo: "2024-01-15T10:30:00" en vez de un número largo.
spring.jackson.serialization.write-dates-as-timestamps=false