# ============================================================
# application.properties - Auth Service
# ============================================================

# Server
server.port=8082
spring.application.name=auth-service

# MongoDB
spring.data.mongodb.uri=mongodb://mongo_user:mongo_pass@localhost:27017/auth_db?authSource=admin
spring.data.mongodb.database=auth_db

# JWT Configuration
# Secret key - must be at least 256 bits (32 characters) for HS256
jwt.secret=modex-secret-key-super-segura-256-bits-para-hs256-algorithm
# Access token expiration - 1 hour in milliseconds
jwt.expiration=3600000
# Refresh token expiration - 7 days in milliseconds
jwt.refresh-expiration=604800000

# Logging
logging.level.com.modex=DEBUG
logging.level.org.springframework.security=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# Jackson
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false